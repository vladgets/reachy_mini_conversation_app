<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 280px; padding: 12px; margin: 0; font-size: 13px; }
    h3   { margin: 0 0 10px; font-size: 14px; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
    .dot.ok   { background: #22c55e; }
    .dot.err  { background: #ef4444; }
    label { font-weight: 600; display: block; margin-bottom: 3px; }
    input { width: 100%; box-sizing: border-box; padding: 5px 7px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
    button { margin-top: 6px; padding: 5px 12px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    button:hover { background: #2563eb; }
    .analysis { margin-top: 10px; padding: 8px; background: #f1f5f9; border-radius: 4px; font-size: 12px; line-height: 1.5; }
    .muted { color: #64748b; font-size: 11px; }
  </style>
</head>
<body>
  <h3>♟ Reachy Chess Advisor</h3>

  <div class="row">
    <div class="dot" id="dot"></div>
    <span id="status">Checking…</span>
  </div>

  <div>
    <label for="url">Reachy URL</label>
    <input id="url" type="text" placeholder="http://localhost:8766">
    <button id="save">Save</button>
  </div>

  <div class="analysis" id="analysis" style="display:none"></div>
  <p class="muted" id="age"></p>
  <p class="muted" id="error" style="display:none;color:#ef4444"></p>

  <script src="popup.js"></script>
</body>
</html>
