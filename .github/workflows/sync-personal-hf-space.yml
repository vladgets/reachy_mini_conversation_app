name: Sync to Personal Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hf-personal-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true

      - name: Sync to personal Hugging Face Space
        uses: huggingface/hub-sync@6fbce0a787a7146710e588abe7a4fd5eca07f47c  # v0.1.0
        with:
          github_repo_id: vladgets/reachy_mini_conversation_app
          huggingface_repo_id: vladgets/reachy_mini_conversation_app
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: static
          private: true
